defaults:
  - train_transform: empty
  - test_transform: empty
  - _self_

name: osv5m_${dataset.embedding_name}
full_batch_size: 4096
cond_dim: 768
eval_batch_size: 4096
output_type: emb
embedding_name: mobileclip2_s4

train_dataset:
  _partial_: true
  _target_: plonk.data.webdataset.GPSWebdataset
  root: ${data_dir}/osv5m/embeddings/mobileclip2_s4/train/
  train: true
  embedding_name: ${dataset.embedding_name}
  return_image: false
  metadata_attributes: []

val_dataset:
  _partial_: true
  _target_: plonk.data.webdataset.GPSWebdataset
  root: ${data_dir}/osv5m/embeddings/mobileclip2_s4/val/
  train: false
  embedding_name: ${dataset.embedding_name}
  return_image: false
  metadata_attributes: ["unique_country", "unique_region", "unique_sub-region", "unique_city"]

test_dataset:
  _partial_: true
  _target_: plonk.data.webdataset.GPSWebdataset
  root: ${data_dir}/osv5m/embeddings/mobileclip2_s4/test/
  train: false
  embedding_name: ${dataset.embedding_name}
  return_image: false
  metadata_attributes: ["unique_country", "unique_region", "unique_sub-region", "unique_city"]
